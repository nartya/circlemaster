<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Join Circle Master</title>
<script>
const params = new URLSearchParams(window.location.search);
const room = params.get('room');
const PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.circlemaster.mawsika';
const APP_STORE_URL = 'https://apps.apple.com/app/id6745800816';

// Immediately remove query params so the link doesn't persist in the browser
window.history.replaceState({}, document.title, window.location.pathname);

function getOS() {
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) return 'iOS';
    if (/android/i.test(userAgent)) return 'Android';
    if (/Macintosh|MacIntel|MacPPC|Mac68K/.test(userAgent)) return 'Mac';

    return 'Other';
}

const os = getOS();

if (os === 'Android') {
    window.location.replace(PLAY_STORE_URL);
} else if (os === 'iOS' || os === 'Mac') {
    window.location.replace(APP_STORE_URL);
}
</script>
</head>
<body style="font-family: Arial; text-align: center; padding: 50px;">
    <h1>🎮 Opening Circle Master...</h1>
    <p>If the app doesn't open automatically:</p>
    <p id="storeLink"></p>
    <p>Then enter the room code shown in your message.</p>
    
    <script>
        // Update the link text based on OS
        const storeLinkElement = document.getElementById('storeLink');
        
        if (os === 'iOS' || os === 'Mac') {
            storeLinkElement.innerHTML = '<a href="' + APP_STORE_URL + '">Download from App Store</a>';
        } else {
            storeLinkElement.innerHTML = '<a href="' + PLAY_STORE_URL + '">Download from Play Store</a>';
        }
    </script>
</body>
</html>
