<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Join Circle Master</title>
<script>
const params = new URLSearchParams(window.location.search);
const room = params.get('room');

// Remove query params so link isn't persistent
window.history.replaceState({}, document.title, window.location.pathname);

function getOS() {
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) return 'iOS';
    if (/android/i.test(userAgent)) return 'Android';
    if (/Macintosh|MacIntel|MacPPC|Mac68K/.test(userAgent)) return 'Mac';

    return 'Other';
}

if (room) {
    const os = getOS();

    let appStoreUrl = 'https://play.google.com/store/apps/details?id=com.circlemaster.mawsika';
    let deepLink = 'circlemaster://join?room=' + room;

    if (os === 'iOS' || os === 'Mac') {
        appStoreUrl = 'https://apps.apple.com/app/id6745800816';
    }

    let appOpened = false;

    document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
            appOpened = true;
        }
    });

    // Try opening app
    window.location.href = deepLink;

    // Fallback
    setTimeout(function () {
        if (!appOpened) {
            window.location.href = appStoreUrl;
        }
    }, 1500);
}
</script>
</head>
<body style="font-family: Arial; text-align: center; padding: 50px;">
    <h1>🎮 Opening Circle Master...</h1>
    <p>If the app doesn't open automatically:</p>
    <p id="storeLink"></p>
    <p>Then enter the room code shown in your message.</p>
    
    <script>
        // Update the link text based on OS
        const os = getOS();
        const storeLinkElement = document.getElementById('storeLink');
        
        if (os === 'iOS' || os === 'Mac') {
            storeLinkElement.innerHTML = '<a href="https://apps.apple.com/app/id6745800816">Download from App Store</a>';
        } else {
            storeLinkElement.innerHTML = '<a href="https://play.google.com/store/apps/details?id=com.circlemaster.mawsika">Download from Play Store</a>';
        }
    </script>
</body>
</html>
