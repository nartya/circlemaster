<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Join Circle Master</title>
<script>
const params = new URLSearchParams(window.location.search);
const room = params.get('room');

// Immediately remove query params so the link doesn't persist in the browser
window.history.replaceState({}, document.title, window.location.pathname);

function getOS() {
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) return 'iOS';
    if (/android/i.test(userAgent)) return 'Android';
    if (/Macintosh|MacIntel|MacPPC|Mac68K/.test(userAgent)) return 'Mac';

    return 'Other';
}

if (room) {
    const os = getOS();
    let fallbackTimer = null;

    if (os === 'Android') {
        // Android Intent URL: opens the app if installed, falls back to Play Store if not.
        // This prevents BOTH the app and the store from opening at the same time.
        const intentUrl = 'intent://join?room=' + encodeURIComponent(room)
            + '#Intent'
            + ';scheme=circlemaster'
            + ';package=com.circlemaster.mawsika'
            + ';S.browser_fallback_url=' + encodeURIComponent('https://play.google.com/store/apps/details?id=com.circlemaster.mawsika')
            + ';end';

        window.location.replace(intentUrl);

    } else if (os === 'iOS' || os === 'Mac') {
        // iOS Universal Links: if the app is installed, iOS intercepts the HTTPS link
        // BEFORE this page even loads, and opens the app directly.
        // If we reach this code, it means the app is NOT installed.
        // → Show the App Store link as fallback (no custom scheme needed).
        const appStoreUrl = 'https://apps.apple.com/app/id6745800816';

        document.addEventListener("DOMContentLoaded", function () {
            const storeLink = document.getElementById('storeLink');
            if (storeLink) {
                storeLink.innerHTML = '<a href="' + appStoreUrl + '">Download from App Store</a>';
            }
        });

    } else {
        // Desktop / other: just show the page with download links
        document.getElementById('storeLink').innerHTML =
            '<a href="https://play.google.com/store/apps/details?id=com.circlemaster.mawsika">Download from Play Store</a>';
    }
}
</script>
</head>
<body style="font-family: Arial; text-align: center; padding: 50px;">
    <h1>🎮 Opening Circle Master...</h1>
    <p>If the app doesn't open automatically:</p>
    <p id="storeLink"></p>
    <p>Then enter the room code shown in your message.</p>
    
    <script>
        // Update the link text based on OS
        const os = getOS();
        const storeLinkElement = document.getElementById('storeLink');
        
        if (os === 'iOS' || os === 'Mac') {
            storeLinkElement.innerHTML = '<a href="https://apps.apple.com/app/id6745800816">Download from App Store</a>';
        } else {
            storeLinkElement.innerHTML = '<a href="https://play.google.com/store/apps/details?id=com.circlemaster.mawsika">Download from Play Store</a>';
        }
    </script>
</body>
</html>
